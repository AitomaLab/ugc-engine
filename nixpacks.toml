# Railway Nixpacks configuration
# Forces Python provider (repo has both package.json and requirements.txt)

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = ["python -m pip install -r requirements.txt"]

[start]
cmd = "PYTHONPATH=. python -m uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}"
