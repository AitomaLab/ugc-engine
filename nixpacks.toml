# Railway Nixpacks configuration
# Force Python provider (repo has package.json + requirements.txt, Nixpacks defaults to Node)

providers = ["python"]

[phases.setup]
nixPkgs = ["ffmpeg"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[start]
cmd = "PYTHONPATH=. python -m uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}"
